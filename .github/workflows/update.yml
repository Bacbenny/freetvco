name: Fetch & Update IPTV Playlist

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'API version'
        required: false
        default: '1.1.2'
      health_check:
        description: 'Health check kenh (true/false)'
        required: false
        default: 'true'
      force:
        description: 'Force commit'
        required: false
        default: 'false'

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt --quiet

      - name: Fetch decrypt health-check
        env:
          COTIVI_VERSION: ${{ github.event.inputs.version || '1.1.2' }}
          HEALTH_CHECK:   ${{ github.event.inputs.health_check || 'true' }}
          OUT_DIR:        ${{ github.workspace }}/output
          DEBUG_DIR:      ${{ github.workspace }}/debug
          SPORT_WORKERS:  20
          HEALTH_WORKERS: 30
          SPORT_TIMEOUT:  12
          HEALTH_TIMEOUT: 10
        run: python3 fetch.py

      - name: Check status
        id: status
        run: |
          if [ -f output/cotivi_all.m3u ]; then
            CH=$(grep -c "^#EXTINF" output/cotivi_channels.m3u 2>/dev/null || echo 0)
            SP=$(grep -c "^#EXTINF" output/cotivi_sports.m3u   2>/dev/null || echo 0)
            ALL=$(grep -c "^#EXTINF" output/cotivi_all.m3u     2>/dev/null || echo 0)
            echo "channels=$ALL" >> "$GITHUB_OUTPUT"
            echo "success=true"  >> "$GITHUB_OUTPUT"
            echo "Channels: $CH | Sports: $SP | Total: $ALL"
          else
            echo "channels=0"    >> "$GITHUB_OUTPUT"
            echo "success=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.status.outputs.success == 'true' || github.event.inputs.force == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ || true
          CHANGED=$(git diff --cached --name-only | wc -l)
          if [ "$CHANGED" -gt 0 ] || [ "${{ github.event.inputs.force }}" = "true" ]; then
            TIMESTAMP=$(TZ=Asia/Ho_Chi_Minh date '+%Y-%m-%d %H:%M %Z')
            COUNT=${{ steps.status.outputs.channels }}
            git commit -m "Auto-update: $COUNT kenh | $TIMESTAMP"
            git push
          else
            echo "Khong co thay doi"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cotivi-debug-${{ github.run_number }}
          path: |
            debug/
            output/
          if-no-files-found: warn
          retention-days: 7
